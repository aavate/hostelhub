<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelHub - Organizations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; } .font-roboto { font-family: 'Roboto', sans-serif; }</style>
</head>
<body class="h-full text-gray-900 antialiased flex">

    <!-- SIDEBAR NAV -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed inset-y-0 left-0 z-20">
        <div class="h-16 flex items-center px-6 border-b border-gray-100 gap-3">
            <div class="h-9 w-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-sm"><i class="fa-solid fa-hotel text-sm"></i></div>
            <span class="text-xl font-bold tracking-tight">Hostel<span class="text-indigo-600">Hub</span></span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-chart-pie text-lg w-5 text-gray-400"></i> Dashboard</a>
                <a href="organizations.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-sitemap text-lg w-5 text-gray-400"></i> Organizations</a>
                <a href="properties.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-building text-lg w-5 text-gray-400"></i> Properties</a>
                <a href="buildings-floors.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-layer-group text-lg w-5 text-gray-400"></i> Buildings & Floors</a>
                <a href="rooms-beds.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-bed text-lg w-5 text-gray-400"></i> Rooms & Beds</a>
                <a href="tenants.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg bg-indigo-50 text-indigo-700 transition-colors"><i class="fa-solid fa-users text-lg w-5 text-indigo-600"></i> Tenants</a>
                <a href="billing-payments.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-file-invoice-dollar text-lg w-5 text-gray-400"></i> Billing & Payments</a>
                <a href="reports.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-chart-line text-lg w-5 text-gray-400"></i> Reports</a>
                <a href="biometric.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-fingerprint text-lg w-5 text-gray-400"></i> Biometric</a>
                <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"><i class="fa-solid fa-sliders text-lg w-5 text-gray-400"></i> Settings</a>
            </nav>
    </aside>

    <div class="pl-64 flex flex-col flex-1 min-w-0 overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10 shrink-0">
            <span class="text-xs font-semibold text-gray-500">Home &gt; <span class="text-gray-900">Organizations</span></span>
            <button class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm">+ Add New Org</button>
        </header>

        <main class="flex-1 p-8 flex flex-col overflow-hidden">
            <div class="bg-white border border-gray-200 rounded-xl flex flex-col flex-1 overflow-hidden shadow-sm">
                <!-- Search & Filters -->
                <div class="p-4 border-b border-gray-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 bg-gray-50">
                    <div class="relative w-64">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" placeholder="Search structures..." class="w-full pl-8 pr-3 py-1.5 bg-white border border-gray-300 rounded-lg text-xs focus:outline-none">
                    </div>
                    <div class="flex gap-2">
                        <button class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-xs font-medium text-gray-600"><i class="fa-solid fa-download mr-1"></i> Export Excel</button>
                    </div>
                </div>
                <!-- Data Table -->
                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead class="bg-gray-100 text-gray-600 uppercase tracking-wider border-b border-gray-200 font-semibold sticky top-0">
                            <tr>
                                <th class="p-4">Organization Name</th>
                                <th class="p-4">Total Properties</th>
                                        <th class="p-4">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 font-medium text-gray-700 font-roboto">
                            <tr>
                                <td class="p-4 font-sans font-semibold text-gray-900">Global Corporate Living Ltd.</td>
                                <td class="p-4">12 Assets Assigned</td>
                                <td class="p-4"><span class="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded-full font-sans text-[10px] font-bold">Active</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
